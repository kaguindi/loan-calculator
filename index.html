<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loan Calculator Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Loan Calculator</h1>

  <label>Loan Amount</label>
  <input type="number" id="amount" placeholder="Enter amount">

  <label>Years</label>
  <input type="number" id="years" placeholder="Number of years">

  <h3>Interest Rate per Year (%)</h3>
  <div id="rates"></div>
  <button onclick="addRate()">+ Add Year Rate</button>

  <h3>Insurance</h3>
  <input type="number" id="insurance" placeholder="Insurance amount">

  <select id="insuranceType">
    <option value="once">Deduct once</option>
    <option value="monthly">Deduct monthly</option>
  </select>

  <button class="calculate" onclick="calculateLoan()">Calculate</button>

  <div id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
